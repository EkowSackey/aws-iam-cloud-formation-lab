AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Automation Lab - Creates IAM users, groups, and permissions with auto-generated password stored in Secrets Manager'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Git Repository Configuration"
        Parameters:
          - GitHubOwner
          - GitHubRepo
          - GitHubBranch

Parameters:
  GitHubOwner:
    Type: String
    Description: GitHub username or organization name
    Default: EkowSackey
  
  GitHubRepo:
    Type: String
    Description: GitHub repository name
    Default: aws-iam-cloudformation-lab
  
  GitHubBranch:
    Type: String
    Description: Branch to sync from
    Default: main

Resources:
  # ===== SECRETS MANAGER: Auto-generated temporary password =====
  # This creates a random password and stores it securely
  # All three IAM users will use this as their initial password
  TemporaryPassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: iam-users-temporary-password
      Description: Auto-generated temporary password for IAM users
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: password
        PasswordLength: 16
        ExcludeCharacters: '"@/\'
        RequireEachIncludedType: true

  # ===== S3 USER GROUP =====
  # Group for users who need S3 access
  S3UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: S3-Users-Group
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  # ===== EC2 USER GROUP =====
  # Group for users who need EC2 access
  EC2UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: EC2-Users-Group
      Policies:
        # Inline policy that allows listing and creating EC2 instances
        - PolicyName: EC2-List-And-Create-Policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceStatus
                  - ec2:DescribeInstanceTypes
                  - ec2:DescribeImages
                  - ec2:DescribeKeyPairs
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:RunInstances
                  - ec2:CreateTags
                Resource: '*'

  # ===== IAM USER: ec2-user1 =====
  # First EC2 user with full EC2 group permissions
  EC2User1:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user1
      Groups:
        - !Ref EC2UserGroup
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${TemporaryPassword}:SecretString:password}}'
        PasswordResetRequired: true
      Tags:
        - Key: Purpose
          Value: IAM-Automation-Lab
        - Key: Group
          Value: EC2-Users

  # ===== IAM USER: ec2-user2 =====
  # Second EC2 user with RESTRICTED permissions (cannot create instances)
  EC2User2:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user2
      Groups:
        - !Ref EC2UserGroup
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${TemporaryPassword}:SecretString:password}}'
        PasswordResetRequired: true
      Policies:
        # Explicit DENY policy that overrides group permissions
        # This prevents ec2-user2 from creating EC2 instances
        - PolicyName: Deny-EC2-Creation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action:
                  - ec2:RunInstances
                Resource: '*'
      Tags:
        - Key: Purpose
          Value: IAM-Automation-Lab
        - Key: Group
          Value: EC2-Users
        - Key: Restriction
          Value: Cannot-Create-Instances

  # ===== IAM USER: s3-user =====
  # S3 user with read-only S3 permissions
  S3User:
    Type: AWS::IAM::User
    Properties:
      UserName: s3-user
      Groups:
        - !Ref S3UserGroup
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${TemporaryPassword}:SecretString:password}}'
        PasswordResetRequired: true
      Tags:
        - Key: Purpose
          Value: IAM-Automation-Lab
        - Key: Group
          Value: S3-Users

Outputs:
  TemporaryPasswordSecretArn:
    Description: ARN of the Secrets Manager secret containing the temporary password
    Value: !Ref TemporaryPassword
    Export:
      Name: IAM-Lab-Temporary-Password-Secret

  S3UserGroupArn:
    Description: ARN of the S3 Users Group
    Value: !GetAtt S3UserGroup.Arn

  EC2UserGroupArn:
    Description: ARN of the EC2 Users Group
    Value: !GetAtt EC2UserGroup.Arn

  EC2User1Arn:
    Description: ARN of ec2-user1
    Value: !GetAtt EC2User1.Arn

  EC2User2Arn:
    Description: ARN of ec2-user2 (restricted from creating instances)
    Value: !GetAtt EC2User2.Arn

  S3UserArn:
    Description: ARN of s3-user
    Value: !GetAtt S3User.Arn

  ConsoleSignInURL:
    Description: AWS Console sign-in URL for IAM users
    Value: !Sub 'https://${AWS::AccountId}.signin.aws.amazon.com/console'

  PasswordRetrievalCommand:
    Description: AWS CLI command to retrieve the temporary password
    Value: !Sub 'aws secretsmanager get-secret-value --secret-id ${TemporaryPassword} --query SecretString --output text | jq -r .password'